<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator — EmerTezora</title>
    <style>
        :root {
            --bg1: #071427;
            --bg2: #0a2a50;
            --glow: #7fd1ff;
            --stroke: #bfe9ff;
            --text: #ffffff;
            --accent: #00ffc8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(1200px 800px at 65% 35%, var(--bg2), var(--bg1) 60%);
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            color: var(--text);
            overflow-x: hidden;
            padding-top: 80px;
        }

        nav {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(6px);
            position: fixed;
            top: 0;
            left: 0;
            padding: 12px 20px;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--glow);
        }

        .container {
            width: min(90vw, 800px);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: clamp(24px, 5vw, 42px);
            margin-bottom: 20px;
            color: var(--glow);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            margin-bottom: 30px;
            text-align: center;
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--glow);
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #000;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            align-self: center;
            box-shadow: 0 0 15px var(--accent);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--accent);
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border-left: 4px solid var(--glow);
            line-height: 1.6;
            white-space: pre-wrap;
            display: none;
        }

        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="bhome.html">← Back to Home</a>
        <span style="font-weight: bold; color: var(--glow);">EmerTezora AI</span>
    </nav>

    <div class="container">
        <h1>AI Text Continuer</h1>
        <p>Enter a prompt about quantum mechanics (or anything else) and let GPT-2 continue the thought.</p>

        <div class="input-group">
            <textarea id="prompt" placeholder="Example: Quantum entanglement is a phenomenon where..."></textarea>
            <button class="btn" id="generateBtn" onclick="generate()">Generate Content</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>AI is thinking... (this may take a few seconds)</span>
        </div>

        <div id="result"></div>
    </div>

    <script src="../js/config.js"></script>
    <script>
        async function generate() {
            const promptInput = document.getElementById('prompt');
            const resultDiv = document.getElementById('result');
            const loading = document.getElementById('loading');
            const generateBtn = document.getElementById('generateBtn');

            const content = promptInput.value.trim();
            if (!content) {
                alert("Please enter some text first.");
                return;
            }

            loading.style.display = 'flex';
            resultDiv.style.display = 'none';
            generateBtn.disabled = true;

            const API_BASE_URL = window.CONFIG ? window.CONFIG.API_BASE_URL : 'http://localhost:5001';

            try {
                const response = await fetch(`${API_BASE_URL}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.textContent = data.generated_text;
                    resultDiv.style.display = 'block';
                } else {
                    alert("Error: " + (data.error || "Internal Server Error"));
                }
            } catch (error) {
                console.error("Fetch error:", error);
                alert("Could not connect to the AI server. Make sure NN6.py is running on port 5001.");
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
