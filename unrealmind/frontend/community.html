<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Community — Unrealmind</title>
    <link rel="stylesheet" href="./src/styles/main.css">
    <link rel="stylesheet" href="./src/styles/community.css">
</head>

<body>

    <!-- Navigation -->
    <nav>
        <div class="nav-brand" style="font-weight:bold;font-size:1.2rem;color:var(--glow);">Unrealmind</div>
        <div class="menu-toggle" onclick="document.getElementById('navMenu').classList.toggle('open')">
            <span></span><span></span><span></span>
        </div>
        <ul id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a class="active" href="community.html">Community</a></li>
            <li><a href="calculations.html">Calculations</a></li>
            <li><a href="formulas.html">Formulas</a></li>
        </ul>
    </nav>

    <!-- Content -->
    <main class="card">
        <h1>Share Your Thoughts ✨</h1>

        <form id="postForm">
            <textarea id="text" placeholder="Share a theory, discovery, or question..." required></textarea>

            <div class="filebox" id="dropZone">
                <p>Drag & drop images here or <span style="color:var(--glow);text-decoration:underline;">Browse</span>
                </p>
                <input type="file" id="images" accept="image/*" multiple hidden>
            </div>

            <div class="thumbs" id="thumbs"></div>

            <div class="actions">
                <button type="button" id="clearBtn" class="secondary">Clear</button>
                <button type="submit">Post to Community</button>
            </div>
        </form>

        <h2 style="margin-top:40px; margin-bottom: 20px; font-weight:600; opacity:0.9;">Recent Discussions</h2>
        <div id="posts" class="posts">
            <!-- Posts injected here -->
            <div style="text-align:center; padding: 20px; opacity: 0.6;">Loading community posts...</div>
        </div>
    </main>

    <!-- Lightbox -->
    <div id="lightbox">
        <img id="lightboxImg">
    </div>

    <script type="module" src="./src/community.js"></script>

</body>

</html>
